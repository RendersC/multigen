<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MultiGen — Generate & Edit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-50">
  <div class="max-w-6xl mx-auto px-4 py-10">

    <div class="flex items-start justify-between gap-4 flex-wrap">
      <div>
        <h1 class="text-3xl md:text-4xl font-semibold tracking-tight">MultiGen — Generate & Edit</h1>
        <p class="text-zinc-400 mt-2">Генерация из текста и редактирование загруженного фото.</p>

        <div class="mt-3 text-sm text-zinc-400">
          Если будут вопросы — пиши в TG:
          <a class="underline hover:text-zinc-200"
             href="https://web.telegram.org/k/#@egreen19"
             target="_blank" rel="noreferrer">@egreen19</a>
        </div>
      </div>

      <a href="https://web.telegram.org/k/#@egreen19" target="_blank" rel="noreferrer"
         class="inline-flex items-center gap-2 rounded-xl bg-zinc-900/60 border border-zinc-800 px-3 py-2 hover:border-zinc-600 transition shadow-lg">
        <span class="text-sm text-zinc-200">TG Support</span>
      </a>
    </div>

    <!-- Tabs -->
    <div class="mt-6 inline-flex rounded-xl bg-zinc-900/60 border border-zinc-800 p-1">
      <button id="tabGenerate" class="px-4 py-2 text-sm rounded-lg bg-white text-zinc-900">Generate</button>
      <button id="tabEdit" class="px-4 py-2 text-sm rounded-lg text-zinc-200 hover:bg-zinc-950/50">Edit photo</button>
    </div>

    <div class="mt-6 grid grid-cols-1 lg:grid-cols-5 gap-6">
      <!-- Controls -->
      <div class="lg:col-span-2 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-5 shadow-lg">
        <form id="form" class="space-y-4">

          <div>
            <label class="block text-sm text-zinc-300 mb-2">Gemini API key</label>
            <input id="apiKey" type="password" autocomplete="off"
              class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500"
              placeholder="AIzaSy..." />
            <p class="text-xs text-zinc-500 mt-2">Ключ не сохраняется. Используется только для запроса.</p>
          </div>

          <!-- Edit-only: upload -->
          <div id="uploadWrap" class="hidden">
            <label class="block text-sm text-zinc-300 mb-2">Загрузить фото</label>
            <input id="imageFile" type="file" accept="image/*"
              class="block w-full text-sm text-zinc-300
                     file:mr-3 file:rounded-xl file:border-0
                     file:bg-white file:text-zinc-900 file:px-4 file:py-2
                     hover:file:bg-zinc-200" />
            <div id="previewWrap" class="mt-3 hidden">
              <div class="text-xs text-zinc-500 mb-2">Preview:</div>
              <img id="previewImg" class="w-full rounded-xl border border-zinc-800" />
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between gap-2 mb-2">
              <label class="block text-sm text-zinc-300">Prompt</label>
              <button id="copyPrompt" type="button"
                class="text-xs px-2 py-1 rounded-lg bg-zinc-950 border border-zinc-800 hover:border-zinc-600 transition">
                Copy prompt
              </button>
            </div>
            <textarea id="prompt" rows="5"
              class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500"></textarea>
            <div id="copyStatus" class="mt-2 text-xs text-zinc-500"></div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm text-zinc-300 mb-2">Модель</label>
              <select id="model"
                class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500">
                <option value="gemini-3-pro-image-preview" selected>gemini-3-pro-image-preview</option>
                <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
              </select>
            </div>

            <div>
              <label class="block text-sm text-zinc-300 mb-2">Кол-во</label>
              <input id="numImages" type="number" min="1" max="10" value="4"
                class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500" />
            </div>

            <div>
              <label class="block text-sm text-zinc-300 mb-2">Aspect ratio</label>
              <select id="aspectRatio"
                class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500">
                <option>1:1</option><option>16:9</option><option>9:16</option><option>4:3</option>
                <option>3:2</option><option>2:3</option><option>3:4</option><option>4:5</option>
                <option>5:4</option><option>21:9</option>
              </select>
            </div>

            <div>
              <label class="block text-sm text-zinc-300 mb-2">Resolution</label>
              <select id="resolution"
                class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:border-zinc-500">
                <option>1K</option><option>2K</option><option>4K</option>
              </select>
            </div>
          </div>

          <!-- Progress -->
          <div id="progressWrap" class="hidden">
            <div class="flex items-center justify-between text-xs text-zinc-400 mb-2">
              <div id="progressText">0/0</div>
              <div id="progressPct">0%</div>
            </div>
            <div class="w-full h-2 rounded-full bg-zinc-950 border border-zinc-800 overflow-hidden">
              <div id="progressBar" class="h-full w-0 bg-white/80"></div>
            </div>
          </div>

          <button id="btn" type="submit"
            class="w-full rounded-xl bg-white text-zinc-900 font-medium py-2.5 hover:bg-zinc-200 transition">
            Run
          </button>

          <div id="status" class="text-sm text-zinc-400"></div>
        </form>
      </div>

      <!-- Results -->
      <div class="lg:col-span-3 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-5 shadow-lg">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-lg font-semibold">Результат</h2>
          <button id="clear"
            class="text-sm px-3 py-1.5 rounded-lg bg-zinc-950 border border-zinc-800 hover:border-zinc-600 transition">
            Очистить
          </button>
        </div>

        <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        <div id="empty" class="mt-10"></div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
